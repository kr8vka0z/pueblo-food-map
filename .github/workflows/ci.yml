name: CI

on:
  # `dev` is now a permanent deploy branch (deploy-dev.yml auto-deploys every push to
  # dev.pueblofoodmap.com), not just a staging area feeding `main` — PRs into it deserve
  # the same lint/typecheck/test/build gate `main` PRs already get. Found during the
  # robot-deploy rollout: PR #302 merged into `dev` with no CI run at all, since this
  # trigger only ever covered `main`.
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Design tokens — lint (report-only)
        # Alpha CLI: non-blocking. A lint error here is informational only and must
        # never break the build — the tool is pre-stable and may produce false positives.
        run: npm run design:lint
        continue-on-error: true

      - name: Design tokens — drift guard (blocking)
        # Blocking invariant: DESIGN.md must mirror globals.css @theme for colors,
        # spacing, and radius tokens. Uses a tool-agnostic pure-Node script so this
        # gate survives any change to the designmd CLI version or availability.
        run: npm run design:drift

      - name: Typecheck
        run: npm run typecheck

      - name: Test with coverage
        # Runs the full test suite and generates lcov for visibility.
        # No global percentage floor — coverage thresholds reward junk tests
        # on solo projects. Required coverage lives in specific test files
        # (filter/search pipeline, hours, 3 API routes, i18n, axe/a11y).
        run: npm run test:coverage

      - name: Upload coverage report
        # Publish the lcov report as a CI artifact for visibility in the PR.
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 14

      - name: npm audit (production deps, high/critical only)
        # Only production deps are shipped to the Worker; dev CVEs stay local.
        # --audit-level=high skips moderate/low. --omit=dev excludes dev deps.
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        run: npm run build
