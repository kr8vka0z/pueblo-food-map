# DEV ONLY. Prod (`main`) deploys via deploy-prod.yml in this same
# directory — once Workers Builds is disconnected (see that file's header),
# both envs deploy via GitHub Actions, never the CF dashboard.
#
# Deploys the `dev` branch to the `pueblo-food-map-staging` Worker at
# dev.pueblofoodmap.com (Access-gated — see AGENTS.md "Admin authentication
# (Cloudflare Access)"; CF_ACCESS_TEAM_DOMAIN/CF_ACCESS_AUD are unset on
# staging today, so /admin fails closed until those are provisioned — that
# provisioning is a separate follow-up, not part of this pipeline). Gated by
# the same `predeploy` suite deploy-prod.yml runs, plus a staging-D1
# remote-migration step: unlike a Worker deploy, a D1 schema migration is a
# separate database operation that never auto-applies on `wrangler deploy`
# (AGENTS.md "Applying the migration — NOT part of a Worker deploy").
#
# Auth: same CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID repo secrets as
# deploy-prod.yml — this repo doesn't yet have a narrower per-env token
# minted (ToastHoster's deploy-dev.yml uses a Worker/D1/zone-scoped token;
# see PR description for the same follow-up here).
#
# Build-time NEXT_PUBLIC_MAPBOX_TOKEN: reuses the MAPBOX_PREVIEW_TOKEN
# secret lighthouse.yml already provisions (AGENTS.md "Lighthouse CI build
# token" — an UNRESTRICTED pk.* token, documented for exactly this case: a
# CI build served on a hostname the production token's URL allowlist
# doesn't cover). dev.pueblofoodmap.com is not on that allowlist either
# (AGENTS.md "Mapbox Token Management" lists only the prod hostnames), so
# the real prod token would 401 here — see PR description Surprises.
# NEXT_PUBLIC_TURNSTILE_SITE_KEY reuses the same secret as prod (Turnstile
# widgets support multiple allowed hostnames on one sitekey, unlike Mapbox's
# no-wildcard restriction) — Kyle should confirm dev.pueblofoodmap.com is an
# allowed hostname on that widget.
name: Deploy Dev

on:
  push:
    branches: [dev]

permissions:
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Predeploy checks, staging D1 migrate, deploy (staging config)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Consumed by `next build` inside the opennextjs-cloudflare build step
      # below — see the file-header comment on secret choice/reuse.
      NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.MAPBOX_PREVIEW_TOKEN }}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
    steps:
      # Same pinned-SHA third-party actions as deploy-prod.yml — a mutable
      # tag could be repointed to malicious code; a SHA cannot.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # 22, not ci.yml's 20: wrangler >=4.x refuses to run on Node <22
          # (hard version check at startup, observed in run 29660459443).
          # Matches ToastHoster's deploy workflows.
          node-version: 22
          cache: npm
      - run: npm ci
      # Same gate deploy-prod.yml and ci.yml run — a broken build must never
      # reach dev.pueblofoodmap.com either.
      - run: npm run predeploy
      # D1 remote migrations are NOT applied by `wrangler deploy` / OpenNext
      # deploy — must run explicitly against the staging database on every
      # deploy that could carry a schema change. `--env staging` resolves
      # the env.staging ADMIN_DB binding (pueblo-food-map-admin-staging) via
      # wrangler.jsonc, not the top-level prod binding.
      - run: npx wrangler d1 migrations apply pueblo-food-map-admin-staging --remote --env staging
      # `-e/--env staging` on both build and deploy resolves wrangler.jsonc's
      # env.staging block (worker `pueblo-food-map-staging`, route
      # dev.pueblofoodmap.com) — confirmed via `npx opennextjs-cloudflare
      # deploy --help`, which forwards wrangler's own -c/-e flags directly
      # (no `--` separator needed, unlike a generic passthrough CLI).
      - run: npx opennextjs-cloudflare build --env staging
      - run: npx opennextjs-cloudflare deploy --env staging
      # NO HC.io /fail step here (deploy-prod.yml has one): the only check is the
      # PROD dead-man's-switch, and a staging-only deploy failure must not page the
      # prod alert channel — a red Actions run is the right signal for dev
      # (PR #305 review).
