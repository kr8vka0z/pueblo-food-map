name: Lighthouse CI

# Runs on every PR and on pushes to main.
#
# PR runs target the Cloudflare Workers preview URL so regressions are caught
# before merge, not after. The preview URL uses a dedicated Mapbox token
# (MAPBOX_PREVIEW_TOKEN) scoped to *.kyle-boyd.workers.dev subdomains; without
# it the map renders "not authorized" and performance / a11y scores collapse.
#
# Safety valve: when MAPBOX_PREVIEW_TOKEN is absent (secret not yet added),
# we skip preview and fall back to the production URL so the gate stays green
# while the token is being provisioned (see 2.2 in issue #161).
#
# Thresholds (mobile preset): accessibility >= 0.95 (error), performance >= 0.65
# (error, standing target). WHY advisory-RED is expected: CI targets production
# (MAPBOX_PREVIEW_TOKEN absent — preview-URL gating not yet armed, #161 item 2.2),
# and prod has not yet received the #202 bundle cut (sync entry JS 212KB->48KB).
# Lighthouse is not a required status check so it does not block merge. After
# the cut deploys (or the preview token arms), re-measure and raise toward 0.70.
# best-practices and SEO remain warn-only.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Derive the target URL:
      # - PRs: use the CF preview subdomain if the preview token is available,
      #        otherwise fall back to production (avoids self-blocking).
      # - main pushes: always use production (preview URL doesn't apply).
      - name: Resolve Lighthouse target URL
        id: url
        env:
          HAS_PREVIEW_TOKEN: ${{ secrets.MAPBOX_PREVIEW_TOKEN != '' }}
          PR_BRANCH: ${{ github.head_ref }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ] && [ "$HAS_PREVIEW_TOKEN" = "true" ]; then
            # CF Workers preview URL pattern: <branch-slug>-pueblo-food-map.kyle-boyd.workers.dev
            BRANCH_SLUG=$(echo "$PR_BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c1-50)
            echo "url=https://${BRANCH_SLUG}-pueblo-food-map.kyle-boyd.workers.dev" >> "$GITHUB_OUTPUT"
            echo "token_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "url=https://pueblofoodmap.com/" >> "$GITHUB_OUTPUT"
            echo "token_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Warn when preview token is absent (PR only)
        if: github.event_name == 'pull_request' && steps.url.outputs.token_present == 'false'
        run: |
          echo "::warning title=Lighthouse running against production::MAPBOX_PREVIEW_TOKEN secret is not set. Lighthouse is targeting the production URL instead of the PR preview. Add the secret to fully arm preview-URL gating (see issue #161 checklist item 2.2)."

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.url.outputs.url }}
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
