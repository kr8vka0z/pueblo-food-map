name: Lighthouse CI

# Runs on every PR and on pushes to main against the live production URL.
# (Previously triggered on Vercel deployment_status events; Vercel is decommissioned
# as of issue #42. CI is now hosted on Cloudflare Workers.)
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Lighthouse against production
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: https://pueblofoodmap.com/
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
