name: Lighthouse CI

# Runs on every PR and on pushes to main. Both measure PRODUCTION
# (https://pueblofoodmap.com/).
#
# Per-branch preview-URL gating is deferred (#161 item 2.2). CF Workers Builds
# does not publish a <branch>-pueblo-food-map.kyle-boyd.workers.dev alias, so
# targeting it 404'd every PR run (Lighthouse errored before scoring); and prod
# Lighthouse perf is Mapbox-GL-runtime-bound, so measuring a preview wouldn't
# change the outcome. The MAPBOX_PREVIEW_TOKEN secret is retained for when
# preview gating is genuinely wired (real preview URL + per-branch Mapbox token
# swap); until then PR runs measure prod too.
#
# Thresholds (mobile preset): accessibility >= 0.95 (error — the hard gate),
# performance >= 0.65 (WARN only). Performance is warn-not-error because prod
# Lighthouse perf is Mapbox-GL-runtime-bound (~0.47 mobile), so a hard floor was
# permanently red and masked real regressions; the lazy-load-map fix that will
# raise it is tracked in #226 (re-promote to error at a verified floor once it
# lands). Lighthouse is not a required status check so it does not block merge.
# best-practices and SEO remain warn-only.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Target production for both PRs and main pushes. Per-branch preview
      # gating is deferred (#161 item 2.2) — see the header comment.
      - name: Resolve Lighthouse target URL
        id: url
        run: echo "url=https://pueblofoodmap.com/" >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.url.outputs.url }}
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
